<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celé menu – Pizzeria EVIJO Sásová</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header {
      background: var(--cream);
      border-bottom: 2px solid var(--border);
      padding: 40px 0 28px;
      margin-top: var(--nav-h);
    }
    .page-header__back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 18px;
      transition: color .2s;
    }
    .page-header__back:hover { color: var(--green); }
    .page-header__title-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .page-header__title-row .section__title { margin-bottom: 0; }

    .menu-full { background: var(--cream); padding: 48px 0 100px; }
    .menu-full .menu__tabs { margin-bottom: 28px; }
    .menu-full .menu__grid { grid-template-columns: repeat(4, 1fr); }

    @media (max-width: 1024px) { .menu-full .menu__grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 720px)  { .menu-full .menu__grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 440px)  { .menu-full .menu__grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="tricolore tricolore--top" aria-hidden="true"></div>

  <!-- NAV -->
  <nav class="nav scrolled" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <img src="logo2.png" alt="Evijo Sásová" class="nav__logo-img" />
      </a>
      <ul class="nav__links" id="navLinks">
        <li><a href="index.html#menu">Ponuka</a></li>
        <li><a href="index.html#delivery">Donáška</a></li>
        <li><a href="index.html#daily">Denné menu</a></li>
        <li><a href="index.html#about">O nás</a></li>
        <li><a href="index.html#contact">Kontakt</a></li>
        <li>
          <a href="javascript:void(0)" class="btn btn--nav glf-button"
             data-glf-cuid="a3c88eed-eb40-41ba-b81e-2e64607109a2"
             data-glf-ruid="2e44b3ce-e9ad-4f3e-a02a-becca4a63b6f">
            Objednať teraz
          </a>
        </li>
      </ul>
      <button class="nav__burger" id="burger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <a href="index.html#menu" class="page-header__back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Späť
      </a>
      <p class="section__label">Celé menu</p>
      <div class="page-header__title-row">
        <h1 class="section__title">Čo u nás nájdete</h1>
        <div class="menu__toggle" id="menuToggle">
          <button class="menu__toggle-btn active" data-mode="restaurant">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3"/><path d="M21 15v7"/></svg>
            Reštaurácia
          </button>
          <button class="menu__toggle-btn" data-mode="delivery">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            Rozvoz
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MENU -->
  <section class="menu-full">
    <div class="container">
      <div class="menu__tabs" id="menuTabs">
        <button class="menu__tab active" data-cat="pizza">Pizza</button>
        <button class="menu__tab" data-cat="cestoviny">Cestoviny &amp; Rizotá</button>
        <button class="menu__tab" data-cat="hlavne">Hlavné jedlá</button>
        <button class="menu__tab" data-cat="salaty">Šaláty</button>
        <button class="menu__tab" data-cat="polievky">Polievky</button>
        <button class="menu__tab" data-cat="prilohy">Prílohy</button>
        <button class="menu__tab" data-cat="dezerty">Dezerty &amp; Nápoje</button>
      </div>
      <div class="menu__grid" id="menuGrid"></div>
    </div>
  </section>

  <div class="tricolore tricolore--bottom" aria-hidden="true"></div>

  <script src="https://www.fbgcdn.com/embedder/js/ewm2.js" defer async></script>
  <script>
    // ===== NAV =====
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.add('scrolled'));
    const burger = document.getElementById('burger');
    const navLinks = document.getElementById('navLinks');
    burger.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

    // ===== FULL MENU DATA =====
    let menuData = { restaurant: {}, delivery: {} };

    async function loadMenuData() {
      try {
        const [restaurant, delivery] = await Promise.all([
          fetch('/content/menu/restaurant.json').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
          fetch('/content/menu/delivery.json').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
        ]);
        menuData.restaurant = restaurant;
        menuData.delivery = delivery;
      } catch (e) {
        const grid = document.getElementById('menuGrid');
        if (grid) grid.innerHTML = '<p class="menu__empty">Menu sa nepodarilo načítať. Skúste obnoviť stránku.</p>';
      }
    }

    // ===== STATE =====
    const urlMode = new URLSearchParams(window.location.search).get('mode');
    let currentMode = urlMode === 'delivery' ? 'delivery' : 'restaurant';
    let currentCat  = 'pizza';

    if (currentMode === 'delivery') {
      document.querySelectorAll('.menu__toggle-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === 'delivery')
      );
    }

    // ===== RENDER =====
    function renderMenu(cat) {
      if (!Object.keys(menuData.restaurant).length) return;
      const grid  = document.getElementById('menuGrid');
      const items = menuData[currentMode][cat] || [];
      grid.innerHTML = '';

      if (!items.length) {
        grid.innerHTML = '<p class="menu__empty">Táto kategória nie je dostupná pre rozvoz.</p>';
        return;
      }

      items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'menu-card reveal';
        card.innerHTML = `
          <div class="menu-card__img" style="background-image:url('${item.img}')">
            <span class="menu-card__tag">${item.tag}</span>
          </div>
          <div class="menu-card__body">
            <div class="menu-card__name">${item.name}</div>
            <div class="menu-card__desc">${item.desc}</div>
            <div class="menu-card__footer">
              <span class="menu-card__price">${item.price}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      requestAnimationFrame(() => {
        grid.querySelectorAll('.reveal').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 60);
        });
      });
    }

    // ===== MODE TOGGLE =====
    document.getElementById('menuToggle').addEventListener('click', e => {
      const btn = e.target.closest('.menu__toggle-btn');
      if (!btn) return;
      document.querySelectorAll('.menu__toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      renderMenu(currentCat);
    });

    // ===== TABS =====
    document.getElementById('menuTabs').addEventListener('click', e => {
      const btn = e.target.closest('.menu__tab');
      if (!btn) return;
      document.querySelectorAll('.menu__tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderMenu(currentCat);
    });

    // ===== SCROLL REVEAL =====
    const revealObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    function observeCards() {
      document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    }

    // ===== INIT =====
    loadMenuData().then(() => {
      renderMenu(currentCat);
      observeCards();
    });
  </script>
</body>
</html>
