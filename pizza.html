    let currentMode = 'restaurant';

    function renderPizzas(mode) {
      const grid = document.getElementById('pizzaGrid');
      grid.innerHTML = '';
      allPizzas[mode].forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'menu-card reveal';
        card.innerHTML = `
          <div class="menu-card__img" style="background-image:url('${item.img}')">
            <span class="menu-card__tag">${item.tag}</span>
          </div>
          <div class="menu-card__body">
            <div class="menu-card__name">${item.name}</div>
            <div class="menu-card__desc">${item.desc}</div>
            <div class="menu-card__footer">
              <span class="menu-card__price">${item.price}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      requestAnimationFrame(() => {
        grid.querySelectorAll('.reveal').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 40);
        });
      });
    }

    document.getElementById('modeRestaurant').addEventListener('click', () => {
      currentMode = 'restaurant';
      document.getElementById('modeRestaurant').classList.add('active');
      document.getElementById('modeDelivery').classList.remove('active');
      renderPizzas(currentMode);
    });
    document.getElementById('modeDelivery').addEventListener('click', () => {
      currentMode = 'delivery';
      document.getElementById('modeDelivery').classList.add('active');
      document.getElementById('modeRestaurant').classList.remove('active');
      renderPizzas(currentMode);
    });
